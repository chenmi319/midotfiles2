# === 1. 终端与兼容性 ===

# xterm-keys 已在 3.2+ 内置，无需显式设置
# 3.2+ 才有 extended-keys
if-shell 'tmux -V | grep -qE "tmux 3\.[2-9]|tmux [4-9]"' \
  'set -g extended-keys on'
# 3.3+ 才支持 extkeys 终端能力声明与 allow-passthrough
if-shell 'tmux -V | grep -qE "tmux 3\.[3-9]|tmux [4-9]"' \
  'run-shell "tmux show -sv terminal-features | grep -q extkeys || tmux set -as terminal-features \",xterm*:extkeys\""; set -g allow-passthrough on'

# TERM（tmux-256color 支持斜体/删除线/undercurl）
set -g default-terminal "tmux-256color"
# 真彩色（24-bit RGB）支持
run-shell 'tmux show -sv terminal-features | grep -q RGB || tmux set -as terminal-features ",xterm-256color:RGB"'
# undercurl + 下划线颜色（neovim 诊断波浪线）
run-shell 'tmux show -sv terminal-features | grep -q usstyle || tmux set -as terminal-features ",xterm-256color:usstyle"'
# 若远端缺少 tmux-256color terminfo，可安装：
#   infocmp -x tmux-256color >/dev/null 2>&1 || \
#   tic -x -o ~/.terminfo /usr/share/terminfo/t/tmux-256color

# === 2. 通用选项 ===

set -sg escape-time 10          # extended-keys 下主要影响 Esc 响应延迟；10ms 够快
set -g repeat-time 300
set -g history-limit 50000
set -g bell-action none              # 不向终端传递 bell（避免 iTerm2 标签页通知）
set -g focus-events on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows off     # 关闭窗口后保留原编号，方便在同位置重开
set -g display-panes-time 2000  # prefix+q 显示 pane 编号的停留时间
set -g display-time 4000        # 消息提示停留时间
set -g set-titles on
set -g set-titles-string '#S:#I'
set -g status-keys emacs        # 命令行用 emacs 键位（C-a/C-e 等更自然）
setw -g mode-keys vi
setw -g monitor-activity on     # 其他窗口有输出时状态栏高亮提示
set -g visual-activity off      # 不弹 "Activity in window N" 消息
set -g activity-action none     # 不发 bell（否则状态栏时间更新会触发 iTerm2 通知）
set -g status-justify centre           # 窗口列表在左右剩余空间中居中
# detach-on-destroy 保持默认 on：关闭 session 最后窗口时直接 detach（更直观）
# 若想自动跳转到其他 session 而非 detach，可改为 no-detached（tmux 3.4+）

# === 3. 键绑定 — 导航 ===

# Vim 感知的 pane 切换（smart-splits.nvim + shell fallback）
unbind -n C-j
unbind -n C-k
unbind -n C-h
unbind -n C-l
# smart-splits.nvim 设置 @pane-is-vim 变量（快速，无 shell 调用）
# is_vim shell 检测作为 fallback（覆盖 opencode/node/k9s 等非 Neovim 程序）
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|/)(g?(view|n?vim?x?)(diff)?|opencode?|node?|k9s?|bash?|[0-9]+(\.[0-9]+)+)([0-9._-]*)?$"'
bind -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" 'if-shell "$is_vim" "send-keys C-h" "select-pane -L"'
bind -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" 'if-shell "$is_vim" "send-keys C-j" "select-pane -D"'
bind -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" 'if-shell "$is_vim" "send-keys C-k" "select-pane -U"'
bind -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" 'if-shell "$is_vim" "send-keys C-l" "select-pane -R"'

# Window 切换
bind -n M-h previous-window
bind -n M-l next-window

# Session 切换
bind S choose-tree -Zs

# === 4. 键绑定 — 窗口与分屏 ===

# 新建/分屏默认在当前目录
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -n M-c new-window -c "#{pane_current_path}"

# 同步输入开关（toggle）
unbind E
bind e setw synchronize-panes \; display "sync: #{?synchronize-panes,ON,OFF}"

# === 5. 键绑定 — 复制与剪贴板 ===

# OSC52 内置剪贴板
set -s set-clipboard on
# 自动探测系统剪贴板命令，统一设置 copy-command（tmux 3.2+）
# 所有 copy-pipe* 命令不带参数时自动使用 copy-command
if-shell 'command -v pbcopy >/dev/null' \
  'set -s copy-command "pbcopy"' \
  'if-shell "command -v xclip >/dev/null" \
     "set -s copy-command \"xclip -selection clipboard\"" \
     "if-shell \"command -v xsel >/dev/null\" \
        \"set -s copy-command \\\"xsel --clipboard --input\\\"\""'

# vi 复制模式
unbind -T copy-mode-vi v
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# 鼠标复制：复制到剪贴板但不退出 copy-mode（避免跳回底部）
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-no-clear
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe-no-clear

# 粘贴（可选：避免覆盖 C-c/C-v 的传统语义）
# bind -T prefix p paste-buffer

# === 6. 键绑定 — 实用工具 ===

# man 页面
bind m command-prompt -p "man page:" "split-window -h 'exec man %%'"
bind M command-prompt -p "Man page:" "new-window -n 'man %1' 'exec man %1'"

# 重新加载配置
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# === 7. 插件 (TPM) ===

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# 主题：catppuccin mocha
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
# 窗口标签显示命令名而非 pane title（避免显示完整主机名）
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

run '~/.tmux/plugins/tpm/tpm'

# 状态栏（必须在 catppuccin 加载后设置）
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -ag status-left " #{E:@catppuccin_status_directory}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_git}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -ag status-right "#{E:@catppuccin_status_host}"

# === 8. 归档（已废弃） ===

# assume-paste-time：仅 2.1 时代的临时项，现代 tmux 不需要
# set -g assume-paste-time 0

# reattach-to-user-namespace：macOS Catalina (10.15) 后不再需要，
# 保留会导致每个 pane 多出一层 zsh -c wrapper，需要退出两次，
# 且 -l (login shell) 会干扰 tmux-resurrect 的目录恢复。
# if-shell "command -v reattach-to-user-namespace > /dev/null" \
#   "set -g default-command 'reattach-to-user-namespace -l $SHELL || $SHELL'"
